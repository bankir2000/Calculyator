<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🇺🇦 Облік боргів (планшет)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Roboto Mono', monospace;
        }
        
        body {
            background: #2d5a27;
            background-image: 
                radial-gradient(circle at 30% 40%, #3b6e33 0%, #2d5a27 40%),
                radial-gradient(circle at 70% 60%, #4a7a3a 0%, #2d5a27 70%);
            min-height: 100vh;
            padding: 15px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(70,100,50,0.3) 5%, transparent 15%),
                radial-gradient(circle at 90% 70%, rgba(40,60,30,0.4) 8%, transparent 20%),
                radial-gradient(circle at 40% 80%, rgba(90,120,60,0.3) 10%, transparent 25%),
                radial-gradient(circle at 80% 30%, rgba(30,50,20,0.5) 7%, transparent 18%);
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(30,40,20,0.9);
            backdrop-filter: blur(3px);
            border: 3px solid #6b8e4c;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(150,200,100,0.3);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        
        header {
            background: linear-gradient(135deg, #3f5130 0%, #1e2b16 100%);
            color: #e6e6b3;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid #8b5a2b;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #9cb071;
        }
        
        header h1 {
            font-size: 2em;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        header h1::before { content: '⚔️'; font-size: 1.2em; }
        header h1::after  { content: '🛡️'; font-size: 1.2em; }
        
        .total-amount {
            font-size: 1.8em;
            font-weight: bold;
            background: #1f2a14;
            padding: 12px 30px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 10px;
            border: 2px solid #b8860b;
            box-shadow: 0 0 15px #8b5a2b;
            color: #f0e68c;
            letter-spacing: 1px;
        }
        
        .add-form {
            background: #26381f;
            padding: 20px;
            border-bottom: 3px solid #7a5c2e;
            background-image: linear-gradient(45deg, rgba(60,80,40,0.5) 25%, transparent 25%),
                              linear-gradient(-45deg, rgba(60,80,40,0.5) 25%, transparent 25%);
            background-size: 30px 30px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 5px;
            color: #e6d5a8;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 3px black;
        }
        
        .form-group input {
            padding: 12px;
            background: #2e3b22;
            border: 2px solid #7f6b3d;
            border-radius: 10px;
            font-size: 1em;
            color: #f0e6c5;
            font-weight: 500;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ca9e1b;
            box-shadow: 0 0 15px #f0b823;
            background: #3f5130;
        }
        
        .form-group input::placeholder {
            color: #8b9a7a;
            font-style: italic;
        }
        
        .btn-add {
            background: linear-gradient(135deg, #6f8745 0%, #3f552b 100%);
            color: #faf3d7;
            border: 2px solid #b9973a;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            height: 48px;
            margin-top: 20px;
            box-shadow: 0 4px 0 #2d401d;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2d401d, 0 0 20px #f5cb5c;
        }
        
        .btn-add:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2d401d;
        }
        
        .table-container {
            padding: 15px;
            overflow-x: auto;
            background: rgba(20,30,10,0.8);
            -webkit-overflow-scrolling: touch;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            border: 2px solid #5c7a3a;
            min-width: 950px;
        }
        
        th {
            background: #2e4523;
            color: #f5e5b9;
            font-weight: 700;
            padding: 12px 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid #6b8e4c;
            text-shadow: 0 0 3px black;
        }
        
        td {
            padding: 12px 8px;
            border: 1px solid #5c733a;
            color: #e2dbb0;
            background: rgba(40,55,30,0.9);
            font-size: 0.95em;
            vertical-align: top;
        }
        
        tr:hover td {
            background: rgba(70,95,50,0.95);
            transition: 0.2s;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .status-active   { background: #4a6130; color: #f9f3d9; border: 1px solid #aab27a; }
        .status-partial  { background: #8b7355; color: #fff3d1; border: 1px solid #ca9e5a; }
        .status-overdue  { background: #5e2e2e; color: #ffcaca; border: 1px solid #c44f4f; animation: blink 1.5s infinite; }
        .status-returned { background: #2d4b2d; color: #b8f3b8; border: 1px solid #7db37d; }
        
        @keyframes blink {
            0%   { opacity: 1; background: #6b2b2b; }
            50%  { opacity: 0.8; background: #9f4b4b; box-shadow: 0 0 10px red; }
            100% { opacity: 1; background: #6b2b2b; }
        }
        
        .btn-delete {
            background: #3e2e1f; color: #f0c0a0;
            border: 2px solid #8b5a2b; border-radius: 8px;
            padding: 6px 10px; cursor: pointer; font-weight: bold;
            transition: 0.2s; font-size: 0.8em; margin-left: 3px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-delete:hover { background: #6b3f1f; color: white; border-color: #d98c2e; transform: scale(1.05); }
        
        .btn-return {
            background: #2f4f2f; color: #e2f0c0;
            border: 2px solid #5c8c5c; border-radius: 8px;
            padding: 6px 10px; cursor: pointer; font-weight: bold;
            transition: 0.2s; font-size: 0.8em;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-return:hover { background: #3f6f3f; border-color: #9fdf9f; transform: scale(1.05); }
        
        .btn-partial {
            background: #8b6b4b; color: #fff0d0;
            border: 2px solid #ca9e6b; border-radius: 8px;
            padding: 6px 10px; cursor: pointer; font-weight: bold;
            transition: 0.2s; font-size: 0.8em; margin-right: 3px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-partial:hover { background: #a88b5a; border-color: #f0b87b; transform: scale(1.05); }

        /* ===== НОВА КНОПКА: Добавити борг ===== */
        .btn-add-debt {
            background: #5c3a7a; color: #e8d0ff;
            border: 2px solid #9b6bca; border-radius: 8px;
            padding: 6px 10px; cursor: pointer; font-weight: bold;
            transition: 0.2s; font-size: 0.8em; margin-right: 3px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-add-debt:hover { background: #7a4f9e; border-color: #c49aee; transform: scale(1.05); }
        /* ======================================= */
        
        .payments-list {
            font-size: 0.85em;
            margin-top: 5px;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(20,30,10,0.5);
            padding: 5px;
            border-radius: 5px;
        }
        
        .payment-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 5px;
            border-bottom: 1px solid #5c733a;
        }

        /* Рядок додаткового боргу — фіолетовий відтінок */
        .payment-item.debt-add {
            background: rgba(80, 40, 110, 0.35);
            color: #ddb8ff;
            border-bottom: 1px solid #7a4faa;
        }
        
        .footer-info {
            background: #1e2b16;
            color: #bbaa77;
            padding: 15px 20px;
            text-align: center;
            border-top: 2px solid #7a5c2e;
            font-size: 0.9em;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .military-tag {
            display: inline-block;
            background: #3f4f2b;
            padding: 3px 15px;
            border-radius: 30px;
            border: 1px solid #b9973a;
            color: #efe8c5;
            font-size: 0.8em;
            text-transform: uppercase;
        }
        
        .clear-data-btn {
            background: #4a3e2b; color: #f0dbb0;
            border: 2px solid #8b7355; border-radius: 30px;
            padding: 8px 16px; font-size: 0.8em; font-weight: bold;
            cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .clear-data-btn:hover { background: #6b5535; border-color: #ca9e5a; }
        
        .remaining-amount {
            font-size: 0.9em;
            color: #f0e68c;
            margin-top: 3px;
        }
        
        /* Модальне вікно */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #26381f;
            margin: 10% auto;
            padding: 25px;
            border: 3px solid #b9973a;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: #e6d5a8;
            box-shadow: 0 0 30px #000;
        }

        /* Модалка додавання боргу — фіолетова рамка */
        .modal-content.add-debt-modal {
            border-color: #9b6bca;
        }
        .modal-content.add-debt-modal h3 {
            color: #ddb8ff;
        }
        
        .modal h3 {
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .modal label {
            display: block;
            margin: 10px 0 4px;
            font-size: 0.85em;
            color: #c8b87a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 4px;
            background: #2e3b22;
            border: 2px solid #7f6b3d;
            border-radius: 10px;
            color: #f0e6c5;
            font-size: 1em;
            font-family: inherit;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }
        
        .modal-btn.save   { background: #2f4f2f; color: #e2f0c0; border: 2px solid #5c8c5c; }
        .modal-btn.save-purple { background: #4a2f6f; color: #e8d0ff; border: 2px solid #9b6bca; }
        .modal-btn.cancel { background: #4f2f2f; color: #f0c0c0; border: 2px solid #8c5c5c; }
        
        @media (max-width: 900px) {
            header h1 { font-size: 1.6em; }
            .total-amount { font-size: 1.5em; padding: 10px 20px; }
            .form-row { grid-template-columns: 1fr 1fr; }
            .btn-add { grid-column: span 2; margin-top: 5px; }
            td, th { padding: 8px 4px; font-size: 0.85em; }
        }
        
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .btn-add { grid-column: span 1; }
            .footer-info { flex-direction: column; text-align: center; }
        }
        
        .btn-add, .btn-return, .btn-delete, .btn-partial, .btn-add-debt {
            min-height: 40px;
            min-width: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ОБЛІК БОРГІВ</h1>
            <div class="military-tag">Позики</div>
            <div class="total-amount" id="totalAmount">0 грн</div>
        </header>

        <div class="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label>ПІБ боржника</label>
                    <input type="text" id="pib" placeholder="Прізвище І.Б.">
                </div>
                <div class="form-group">
                    <label>Дата позики</label>
                    <input type="date" id="loanDate">
                </div>
                <div class="form-group">
                    <label>Сума боргу (грн)</label>
                    <input type="number" id="amount" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Повернути до</label>
                    <input type="date" id="deadline">
                </div>
                <button class="btn-add" id="addBtn">+ Додати</button>
            </div>
        </div>

        <div class="table-container">
            <table id="debtsTable">
                <thead>
                    <tr>
                        <th>ПІБ</th>
                        <th>Дата позики</th>
                        <th>Сума (загальна)</th>
                        <th>Залишок</th>
                        <th>Повернути до</th>
                        <th>Статус</th>
                        <th>Історія</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="footer-info">
            <span id="recordCount">0 записів</span>
            <span id="overdueCount">0 прострочено</span>
            <span id="totalPaid">Повернено: 0 грн</span>
            <button class="clear-data-btn" id="exportBtn">📥 Експорт</button>
            <button class="clear-data-btn" id="importBtn">📤 Імпорт</button>
            <input type="file" id="importFile" accept=".json" style="display:none">
            <button class="clear-data-btn" id="clearDataBtn">Очистити всі дані</button>
            <span class="military-tag">🇺🇦</span>
        </div>
    </div>

    <!-- Модальне вікно: Часткове повернення -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h3>➕ Часткове повернення</h3>
            <p id="modalDebtInfo" style="margin-bottom:5px; font-size:0.9em;"></p>
            <label>Дата повернення:</label>
            <input type="date" id="paymentDate" class="modal-input">
            <label>Сума (грн):</label>
            <input type="number" id="paymentAmount" class="modal-input" placeholder="0" min="1">
            <div class="modal-buttons">
                <button class="modal-btn save" id="savePaymentBtn">Зберегти</button>
                <button class="modal-btn cancel" id="cancelPaymentBtn">Скасувати</button>
            </div>
        </div>
    </div>

    <!-- Модальне вікно: Додати суму боргу -->
    <div id="addDebtModal" class="modal">
        <div class="modal-content add-debt-modal">
            <h3>📈 Додати до боргу</h3>
            <p id="addDebtInfo" style="margin-bottom:5px; font-size:0.9em; color:#ddb8ff;"></p>
            <label>Дата:</label>
            <input type="date" id="addDebtDate" class="modal-input">
            <label>Сума додаткового боргу (грн):</label>
            <input type="number" id="addDebtAmount" class="modal-input" placeholder="0" min="1">
            <label>Коментар (необов'язково):</label>
            <input type="text" id="addDebtComment" class="modal-input" placeholder="напр. нова позика">
            <div class="modal-buttons">
                <button class="modal-btn save-purple" id="saveAddDebtBtn">Додати</button>
                <button class="modal-btn cancel" id="cancelAddDebtBtn">Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        function loadDebts() {
            const saved = localStorage.getItem('tabletDebtsMultiple');
            if (saved) return JSON.parse(saved);
            return [
                {
                    pib: 'Шевченко Т.Г.',
                    loanDate: '2026-03-01',
                    amount: 1500,
                    payments: [
                        { date: '2026-03-10', amount: 500 },
                        { date: '2026-03-15', amount: 300 }
                    ],
                    extraDebts: [],
                    deadline: '2026-03-20',
                    returned: false
                },
                {
                    pib: 'Франко І.Я.',
                    loanDate: '2026-02-15',
                    amount: 800,
                    payments: [
                        { date: '2026-02-20', amount: 300 },
                        { date: '2026-02-28', amount: 500 }
                    ],
                    extraDebts: [],
                    deadline: '2026-03-05',
                    returned: true
                },
                {
                    pib: 'Леся Українка',
                    loanDate: '2026-03-10',
                    amount: 2200,
                    payments: [],
                    extraDebts: [],
                    deadline: '2026-03-30',
                    returned: false
                }
            ];
        }

        let debts = loadDebts();
        let currentPaymentIndex = -1;
        let currentAddDebtIndex = -1;

        const tableBody        = document.getElementById('tableBody');
        const totalAmountSpan  = document.getElementById('totalAmount');
        const recordCountSpan  = document.getElementById('recordCount');
        const overdueCountSpan = document.getElementById('overdueCount');
        const totalPaidSpan    = document.getElementById('totalPaid');

        // --- Payment modal elements ---
        const modal           = document.getElementById('paymentModal');
        const modalDebtInfo   = document.getElementById('modalDebtInfo');
        const paymentDate     = document.getElementById('paymentDate');
        const paymentAmount   = document.getElementById('paymentAmount');
        const savePaymentBtn  = document.getElementById('savePaymentBtn');
        const cancelPaymentBtn= document.getElementById('cancelPaymentBtn');

        // --- Add-debt modal elements ---
        const addDebtModal      = document.getElementById('addDebtModal');
        const addDebtInfo       = document.getElementById('addDebtInfo');
        const addDebtDate       = document.getElementById('addDebtDate');
        const addDebtAmount     = document.getElementById('addDebtAmount');
        const addDebtComment    = document.getElementById('addDebtComment');
        const saveAddDebtBtn    = document.getElementById('saveAddDebtBtn');
        const cancelAddDebtBtn  = document.getElementById('cancelAddDebtBtn');

        function today() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function formatDate(ds) {
            if (!ds) return '-';
            return new Date(ds).toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric' });
        }

        // Загальна сума боргу = початкова + всі додаткові борги
        function totalDebt(debt) {
            const extra = (debt.extraDebts || []).reduce((s, e) => s + e.amount, 0);
            return debt.amount + extra;
        }

        function getStatus(deadline, returned, debt) {
            const totalPaid = (debt.payments || []).reduce((s, p) => s + p.amount, 0);
            const total = totalDebt(debt);
            const remaining = total - totalPaid;

            if (returned || remaining <= 0) return { text: 'Повернуто', class: 'status-returned' };

            const now = new Date(); now.setHours(0,0,0,0);

            if (totalPaid > 0) {
                if (!deadline) return { text: 'Частково', class: 'status-partial' };
                const dl = new Date(deadline); dl.setHours(0,0,0,0);
                return dl < now
                    ? { text: '⚠️ Прострочено', class: 'status-overdue' }
                    : { text: 'Частково', class: 'status-partial' };
            }

            if (!deadline) return { text: 'Активно', class: 'status-active' };
            const dl = new Date(deadline); dl.setHours(0,0,0,0);
            return dl < now
                ? { text: '⚠️ Прострочено', class: 'status-overdue' }
                : { text: 'Активно', class: 'status-active' };
        }

        // ===== Відкрити модалку повернення =====
        window.openPaymentModal = (index) => {
            const debt = debts[index];
            if (!debt) return;
            const paid = (debt.payments || []).reduce((s, p) => s + p.amount, 0);
            const remaining = totalDebt(debt) - paid;
            if (remaining <= 0) { alert('Борг вже повністю повернуто!'); return; }
            currentPaymentIndex = index;
            modalDebtInfo.innerText = `${debt.pib} — залишок: ${remaining.toLocaleString()} грн`;
            paymentDate.value = today();
            paymentAmount.value = '';
            modal.style.display = 'block';
        };

        savePaymentBtn.addEventListener('click', () => {
            if (currentPaymentIndex === -1) return;
            const debt = debts[currentPaymentIndex];
            const date = paymentDate.value;
            const amount = parseFloat(paymentAmount.value);
            if (!date) { alert('Виберіть дату повернення!'); return; }
            if (!amount || amount <= 0) { alert('Введіть коректну суму!'); return; }
            const paid = (debt.payments || []).reduce((s, p) => s + p.amount, 0);
            const remaining = totalDebt(debt) - paid;
            if (amount > remaining) { alert(`Сума не може перевищувати залишок (${remaining.toLocaleString()} грн)!`); return; }
            if (!debt.payments) debt.payments = [];
            debt.payments.push({ date, amount });
            debt.payments.sort((a, b) => new Date(a.date) - new Date(b.date));
            const newPaid = debt.payments.reduce((s, p) => s + p.amount, 0);
            if (newPaid >= totalDebt(debt)) debt.returned = true;
            modal.style.display = 'none';
            currentPaymentIndex = -1;
            renderTable();
        });

        cancelPaymentBtn.addEventListener('click', () => {
            modal.style.display = 'none';
            currentPaymentIndex = -1;
        });

        // ===== Відкрити модалку додавання боргу =====
        window.openAddDebtModal = (index) => {
            const debt = debts[index];
            if (!debt) return;
            currentAddDebtIndex = index;
            addDebtInfo.innerText = `${debt.pib} — поточний борг: ${totalDebt(debt).toLocaleString()} грн`;
            addDebtDate.value = today();
            addDebtAmount.value = '';
            addDebtComment.value = '';
            addDebtModal.style.display = 'block';
        };

        saveAddDebtBtn.addEventListener('click', () => {
            if (currentAddDebtIndex === -1) return;
            const debt = debts[currentAddDebtIndex];
            const date = addDebtDate.value;
            const amount = parseFloat(addDebtAmount.value);
            const comment = addDebtComment.value.trim();
            if (!date) { alert('Виберіть дату!'); return; }
            if (!amount || amount <= 0) { alert('Введіть коректну суму!'); return; }
            if (!debt.extraDebts) debt.extraDebts = [];
            debt.extraDebts.push({ date, amount, comment: comment || null });
            debt.extraDebts.sort((a, b) => new Date(a.date) - new Date(b.date));
            // Якщо борг вважався поверненим, знімаємо цей статус
            if (debt.returned) debt.returned = false;
            addDebtModal.style.display = 'none';
            currentAddDebtIndex = -1;
            renderTable();
        });

        cancelAddDebtBtn.addEventListener('click', () => {
            addDebtModal.style.display = 'none';
            currentAddDebtIndex = -1;
        });

        // Закриття модалок по кліку поза ними
        window.addEventListener('click', (e) => {
            if (e.target === modal) { modal.style.display = 'none'; currentPaymentIndex = -1; }
            if (e.target === addDebtModal) { addDebtModal.style.display = 'none'; currentAddDebtIndex = -1; }
        });

        // ===== Рендер таблиці =====
        function renderTable() {
            let totalBorrowed = 0, totalPaidSum = 0, overdue = 0;
            let rows = '';

            debts.forEach((debt, index) => {
                const payments   = debt.payments   || [];
                const extraDebts = debt.extraDebts || [];
                const total      = totalDebt(debt);
                const paid       = payments.reduce((s, p) => s + p.amount, 0);
                const remaining  = total - paid;

                totalBorrowed += total;
                totalPaidSum  += paid;

                const status = getStatus(debt.deadline, debt.returned, debt);
                if (status.class === 'status-overdue' && !debt.returned && remaining > 0) overdue++;

                // ===== Історія (платежі + додаткові борги в хронологічному порядку) =====
                // Збираємо всі події разом і сортуємо
                const events = [
                    ...payments.map(p => ({ date: p.date, type: 'pay', amount: p.amount, comment: null })),
                    ...extraDebts.map(e => ({ date: e.date, type: 'add', amount: e.amount, comment: e.comment }))
                ].sort((a, b) => new Date(a.date) - new Date(b.date));

                let historyHtml = '';
                if (events.length > 0) {
                    historyHtml = '<div class="payments-list">';
                    events.forEach(ev => {
                        if (ev.type === 'pay') {
                            historyHtml += `<div class="payment-item">
                                <span>${formatDate(ev.date)}</span>
                                <span style="color:#b8f3b8;">−${ev.amount.toLocaleString()} грн</span>
                            </div>`;
                        } else {
                            historyHtml += `<div class="payment-item debt-add">
                                <span>${formatDate(ev.date)}${ev.comment ? ' · ' + ev.comment : ''}</span>
                                <span>+${ev.amount.toLocaleString()} грн</span>
                            </div>`;
                        }
                    });
                    historyHtml += '</div>';
                } else {
                    historyHtml = '<span style="color:#8b9a7a;">Немає записів</span>';
                }

                // ===== Дії =====
                let actions = '';
                if (!debt.returned && remaining > 0) {
                    actions = `
                        <div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center;">
                            <button class="btn-add-debt" onclick="openAddDebtModal(${index})">📈 +Борг</button>
                            <button class="btn-partial"  onclick="openPaymentModal(${index})">↩ Внесок</button>
                            <button class="btn-return"   onclick="markAsReturned(${index})">✔ Повністю</button>
                            <button class="btn-delete"   onclick="deleteDebt(${index})">✖</button>
                        </div>`;
                } else {
                    actions = `
                        <div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center;">
                            <button class="btn-add-debt" onclick="openAddDebtModal(${index})">📈 +Борг</button>
                            <button class="btn-delete"   onclick="deleteDebt(${index})">✖</button>
                        </div>`;
                }

                // Відображення суми: якщо є додаткові, показуємо розбивку
                let amountCell = `${total.toLocaleString()} грн`;
                if (extraDebts.length > 0) {
                    amountCell += `<div style="font-size:0.8em;color:#bba0dd;margin-top:2px;">
                        (${debt.amount.toLocaleString()} + ${extraDebts.reduce((s,e)=>s+e.amount,0).toLocaleString()})
                    </div>`;
                }

                rows += `<tr>
                    <td><strong>${debt.pib || 'Без імені'}</strong></td>
                    <td>${formatDate(debt.loanDate)}</td>
                    <td>${amountCell}</td>
                    <td>
                        <strong>${remaining.toLocaleString()} грн</strong>
                        ${paid > 0 ? `<div class="remaining-amount">(повернено ${paid.toLocaleString()})</div>` : ''}
                    </td>
                    <td>${formatDate(debt.deadline)}</td>
                    <td><span class="status-badge ${status.class}">${status.text}</span></td>
                    <td>${historyHtml}</td>
                    <td>${actions}</td>
                </tr>`;
            });

            tableBody.innerHTML = rows;
            totalAmountSpan.innerText  = totalBorrowed.toLocaleString() + ' грн';
            recordCountSpan.innerText  = debts.length + ' записів';
            overdueCountSpan.innerText = overdue + ' прострочено';
            totalPaidSpan.innerText    = `Повернено: ${totalPaidSum.toLocaleString()} грн`;

            localStorage.setItem('tabletDebtsMultiple', JSON.stringify(debts));
        }

        // Додавання нового боргу
        document.getElementById('addBtn').addEventListener('click', () => {
            const pib      = document.getElementById('pib').value.trim();
            const loanDate = document.getElementById('loanDate').value;
            const amount   = parseFloat(document.getElementById('amount').value) || 0;
            const deadline = document.getElementById('deadline').value;

            if (!pib || !loanDate) { alert('Будь ласка, заповніть ПІБ та дату позики!'); return; }
            if (amount <= 0) { alert('Сума має бути більше 0!'); return; }

            debts.push({ pib, loanDate, amount, payments: [], extraDebts: [], deadline: deadline || null, returned: false });
            renderTable();

            document.getElementById('pib').value      = '';
            document.getElementById('loanDate').value = '';
            document.getElementById('amount').value   = '';
            document.getElementById('deadline').value = '';
        });

        window.markAsReturned = (index) => {
            if (!debts[index]) return;
            const debt = debts[index];
            debt.returned = true;
            const paid = (debt.payments || []).reduce((s, p) => s + p.amount, 0);
            const total = totalDebt(debt);
            if (paid < total) {
                debt.payments.push({ date: today(), amount: total - paid });
            }
            renderTable();
        };

        window.deleteDebt = (index) => {
            if (confirm('Видалити цей запис?')) {
                debts.splice(index, 1);
                renderTable();
            }
        };

        document.getElementById('clearDataBtn').addEventListener('click', () => {
            if (confirm('Видалити ВСІ записи? Цю дію не можна скасувати!')) {
                debts = [];
                renderTable();
            }
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const json = JSON.stringify(debts, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            const d    = new Date();
            const ds   = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            a.href = url; a.download = `борги_${ds}.json`; a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('importFile').click();
        });

        document.getElementById('importFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!Array.isArray(imported)) throw new Error();
                    if (debts.length > 0) {
                        if (!confirm(`Замінити поточні дані (${debts.length} записів) імпортованими (${imported.length} записів)?`)) {
                            e.target.value = ''; return;
                        }
                    }
                    debts = imported;
                    renderTable();
                    alert(`✅ Імпортовано ${imported.length} записів!`);
                } catch {
                    alert('❌ Помилка читання файлу.');
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        renderTable();
    </script>
</body>
</html>
